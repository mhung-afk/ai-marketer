name: Python Linting and Formatting

on:
  push:
    branches: [ main, 001-phase1-foundation ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Format check with black
      run: |
        black --check --line-length=100 . --exclude="cdk.context.json"

    - name: Type check with mypy
      run: |
        mypy . --ignore-missing-imports --no-implicit-optional || true

    - name: Pylint check
      run: |
        pylint $(find . -type f -name "*.py" | grep -E "(cdk|src|tests)" | head -20) --disable=all --enable=E,F || true
